<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>

    <link rel="stylesheet" href="Css/formulario.css">

    <script src="Js/libreria.js"></script>
    <script src="Js/formulario.js" defer></script>
</head>
<body>

    <div class="contenedor">
        <h2>Formulario</h2>

        <form id="formulario">

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" required>

            <label for="fechaNacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fechaNacimiento" required>

            <label for="numero">Número (máx. 5 dígitos):</label>
            <input type="number" id="numero" required>

            <label for="textoLibre">Texto libre:</label>
            <input type="text" id="textoLibre">

            <label for="numeroPar">Número para validar par:</label>
            <input type="number" id="numeroPar">

            <button type="submit">Enviar</button>

        </form>
    </div>

</body>
</html>
